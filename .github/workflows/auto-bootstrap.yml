name: Auto-Bootstrap New Repos

# Runs every hour and on manual trigger.
# Scans all ShadowWalkerNC repos, finds any missing AGENTS.md, and pushes one.
# Required secret: ORG_BOOTSTRAP_TOKEN
#   — Fine-grained PAT with Contents: Read & Write on all org repos
#   — Or classic PAT with `repo` scope
#   Set at: https://github.com/organizations/ShadowWalkerNC/settings/secrets/actions

on:
  schedule:
    - cron: '0 * * * *'   # Every hour
  workflow_dispatch:       # Manual trigger — run immediately after creating a new repo
    inputs:
      dry_run:
        description: 'Dry run (list repos that would be bootstrapped, do not push)'
        required: false
        default: 'false'
        type: boolean

jobs:
  bootstrap:
    name: Detect and Bootstrap New Repos
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout .github repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ORG_BOOTSTRAP_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install @octokit/rest

      - name: Bootstrap missing repos
        env:
          ORG_BOOTSTRAP_TOKEN: ${{ secrets.ORG_BOOTSTRAP_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: node .github/scripts/bootstrap-repos.js
