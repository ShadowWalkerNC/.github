name: Auto-Bootstrap New Repos

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (list only, no push)'
        required: false
        default: 'false'
        type: boolean

jobs:
  bootstrap:
    name: Detect and Bootstrap New Repos
    runs-on: ubuntu-latest

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Octokit
        run: npm install @octokit/rest

      - name: Run bootstrap script
        env:
          ORG_BOOTSTRAP_TOKEN: ${{ secrets.ORG_BOOTSTRAP_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          cat << 'SCRIPT' > bootstrap.js
          const { Octokit } = require('@octokit/rest');
          const ORG = 'ShadowWalkerNC';
          const DRY_RUN = process.env.DRY_RUN === 'true';
          const TOKEN = process.env.ORG_BOOTSTRAP_TOKEN;
          const SKIP_REPOS = ['.github'];

          if (!TOKEN) { console.error('ERROR: ORG_BOOTSTRAP_TOKEN not set.'); process.exit(1); }

          const octokit = new Octokit({ auth: TOKEN });

          async function getAllRepos() {
            const repos = [];
            let page = 1;
            while (true) {
              const { data } = await octokit.repos.listForUser({ username: ORG, type: 'owner', per_page: 100, page });
              if (!data.length) break;
              repos.push(...data);
              if (data.length < 100) break;
              page++;
            }
            return repos;
          }

          async function hasAgentsMd(repo, branch) {
            try {
              await octokit.repos.getContent({ owner: ORG, repo, path: 'AGENTS.md', ref: branch });
              return true;
            } catch(e) { if (e.status === 404) return false; throw e; }
          }

          async function getTemplate() {
            const { data } = await octokit.repos.getContent({ owner: ORG, repo: '.github', path: 'templates/AGENTS.md' });
            return Buffer.from(data.content, 'base64').toString('utf8');
          }

          async function detectStack(repo, branch) {
            const checks = [
              ['package.json','Node.js/TypeScript'],['pnpm-workspace.yaml','pnpm monorepo'],
              ['turbo.json','Turborepo'],['build.gradle.kts','Kotlin/Android'],
              ['Cargo.toml','Rust'],['go.mod','Go'],['pyproject.toml','Python'],
              ['docker-compose.yml','Docker'],['next.config.ts','Next.js'],
              ['next.config.js','Next.js'],
            ];
            const found = [];
            for (const [path, hint] of checks) {
              try {
                await octokit.repos.getContent({ owner: ORG, repo, path, ref: branch });
                if (!found.includes(hint)) found.push(hint);
              } catch {}
            }
            return found.length ? found.join(' · ') : 'Unknown — update manually';
          }

          function fillTemplate(template, name, desc, stack, url, branch) {
            const date = new Date().toISOString().split('T')[0];
            return template
              .replace(/\[PROJECT NAME\]/g, name)
              .replace(/\[project name\]/g, name)
              .replace(/\[one sentence — what this is and what problem it solves\]/g,
                (desc || 'No description — update this.').substring(0, 200))
              .replace(/\[e\.g\. TypeScript, Kotlin, Python\]/g, 'Detected: ' + stack)
              .replace(/\[current phase number and name\]/g, '0 — Initial setup')
              .replace(/\[planning \| in development \| in production \| paused\]/g, 'planning')
              .replace(/\[active \| maintenance \| low\]/g, 'active')
              + `\n\n---\n*Auto-generated: ${date} | Extends: ShadowWalkerNC/.github/AGENTS.md | Repo: [${name}](${url})*\n*Action required: Fill in all placeholder fields before using this repo in a session.*\n`;
          }

          async function main() {
            console.log(`Bootstrap — Org: ${ORG} | Dry run: ${DRY_RUN}`);
            const [repos, template] = await Promise.all([getAllRepos(), getTemplate()]);
            console.log(`Found ${repos.length} repos`);
            let pushed = 0;
            for (const repo of repos) {
              const { name, default_branch: branch, archived, disabled, description, html_url } = repo;
              if (SKIP_REPOS.includes(name) || archived || disabled) { console.log(`SKIP: ${name}`); continue; }
              if (await hasAgentsMd(name, branch)) { console.log(`OK:   ${name}`); continue; }
              const stack = await detectStack(name, branch);
              console.log(`NEED: ${name} (${stack})`);
              if (!DRY_RUN) {
                const filled = fillTemplate(template, name, description, stack, html_url, branch);
                const content = Buffer.from(filled).toString('base64');
                await octokit.repos.createOrUpdateFileContents({
                  owner: ORG, repo: name, path: 'AGENTS.md', branch,
                  message: 'feat(agents): auto-bootstrap AGENTS.md from canonical template — fill in placeholders before use',
                  content,
                });
                console.log(`DONE: ${name}`);
                pushed++;
              }
            }
            console.log(`\nPushed: ${pushed}`);
          }

          main().catch(e => { console.error(e); process.exit(1); });
          SCRIPT
          node bootstrap.js
